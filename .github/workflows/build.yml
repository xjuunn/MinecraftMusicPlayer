name: Build

on:
  push:
    branches: [ "**" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "**" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gradle/actions/wrapper-validation@v4
      - uses: actions/setup-java@v4
        with:
          java-version: 26
          distribution: oracle
      - run: chmod +x gradlew
      - run: ./gradlew clean build

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          gh release create "${{ github.ref_name }}" \
            --generate-notes \
            $(find build/libs -name '*-fabricmc*.jar' ! -name '*-sources.jar')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
