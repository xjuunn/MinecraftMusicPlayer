name: Build

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gradle/actions/wrapper-validation@v4
      - uses: actions/setup-java@v4
        with:
          java-version: 26
          distribution: oracle
      - run: chmod +x gradlew

      - name: Get version
        id: version
        shell: bash
        run: |
          VERSION=v$(grep 'mod_version' gradle.properties | cut -d'=' -f2 | tr -d ' ')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create tag
        if: github.event_name == 'push'
        shell: bash
        run: |
          if git rev-parse "refs/tags/${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.version.outputs.version }} already exists"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag "${{ steps.version.outputs.version }}"
            git push origin "${{ steps.version.outputs.version }}"
          fi

      - run: ./gradlew clean build

      - name: Create Release
        if: github.event_name == 'push'
        shell: bash
        run: |
          if gh release view "${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "Release ${{ steps.version.outputs.version }} already exists"
          else
            gh release create "${{ steps.version.outputs.version }}" \
              --generate-notes \
              $(find build/libs -name '*-fabricmc*.jar' ! -name '*-sources.jar')
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
